services:
  app:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=user
      - DB_PASSWORD=624562
      - DB_NAME=learn-6
      - NODE_ENV=development
      - EMAIL_SERVICE_URL=http://python-mailer:8000
      - JWT_SECRET=kafjaksjfoje154646fesafesfaefea64f6ae4f684af68e
      - STRIPE_WEBHOOK_SECRET=whsec_5761b7151482e6a76c11e0d1838eea0bb1e4cf7afde4e9c9b28c55388c817e38
      - STRIPE_SECRET_KEY=sk_test_51TAfFx3sfSvpeoCg8rhe4ltKRHc3GYcHNeJQfrqzfibBhlyo92A4MCZM8JKQvRki3LzOYfiC63OXBEivWibOw9u900IrJgdY5A
    ports:
      - "3000:3000"
    depends_on:
      - postgres-db
      - python-mailer
    networks:
      - backend-network

    volumes:
      - ./Server:/app
      - /app/node_modules
      - /app/dist
      - ./Server/uploads:/app/uploads

  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: "624562"
      POSTGRES_DB: learn-6
    ports:
      - "5433:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - backend-network

  python-mailer:
    container_name: mailer
    build:
      context: ./Server/Microservices/Email/
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    networks:
      - backend-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./Server/uploads:/app/uploads:ro
      - ./Client/Shop:/usr/share/nginx/html/shop
      - ./Client/Admin:/usr/share/nginx/html/admin
      - ./Client/Success:/usr/share/nginx/html/success
      - ./Client/Cancel:/usr/share/nginx/html/cancel
    depends_on:
      - app
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  postgres:
  webroot:
